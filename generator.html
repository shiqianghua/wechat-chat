<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信聊天生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #e0e0e0; min-height: 100vh; }

/* Top Bar */
.topbar { height: 48px; background: #fff; display: flex; align-items: center; padding: 0 14px; gap: 10px; border-bottom: 1px solid #e0e0e0; }
.topbar select { height: 32px; padding: 0 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; min-width: 140px; outline: none; background: #fff; }
.topbar .tb-btn { height: 32px; padding: 0 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; cursor: pointer; background: #fff; white-space: nowrap; }
.topbar .tb-btn:hover { background: #f5f5f5; }
.topbar .tb-btn.primary { background: #07c160; color: #fff; border-color: #07c160; }
.topbar .tb-btn.primary:hover { background: #06ad56; }
.topbar .tb-btn.danger { color: #e74c3c; border-color: #e74c3c; }
.topbar .tb-btn.danger:hover { background: #fff5f5; }
.topbar .spacer { flex: 1; }

.app { display: flex; height: calc(100vh - 48px); }
.left-panel { width: 380px; min-width: 380px; background: #fff; display: flex; flex-direction: column; border-right: 1px solid #ddd; overflow-y: auto; }
.panel-section { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; }
.panel-section h3 { font-size: 13px; color: #888; margin-bottom: 10px; font-weight: 500; }
.form-row { display: flex; gap: 10px; margin-bottom: 8px; }
.form-row label { font-size: 13px; color: #333; min-width: 50px; line-height: 30px; }
.form-row input { flex: 1; height: 30px; padding: 0 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none; }
.form-row input:focus { border-color: #07c160; }
.avatar-row { display: flex; gap: 16px; }
.avatar-item { flex: 1; text-align: center; }
.avatar-item label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
.avatar-preview { width: 40px; height: 40px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 4px; }
.avatar-left { background: #ff7675; color: #fff; }
.avatar-right { background: #4a90d9; color: #fff; }
.avatar-item input { width: 100%; height: 28px; padding: 0 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; text-align: center; outline: none; }
#chatInput { width: 100%; min-height: 240px; border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px; font-size: 13px; line-height: 1.8; font-family: "SF Mono", Menlo, Consolas, monospace; resize: vertical; outline: none; background: #fafafa; }
#chatInput:focus { border-color: #07c160; background: #fff; }
.format-hint { font-size: 11px; color: #bbb; margin-top: 6px; line-height: 1.7; }
.format-hint b { color: #07c160; font-weight: 500; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn { flex: 1; height: 36px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: #07c160; color: #fff; }
.btn-primary:hover { background: #06ad56; }
.btn-outline { background: #fff; color: #333; border: 1px solid #ddd; }
.btn-outline:hover { background: #f5f5f5; }

.phone-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #e8e8e8; padding: 16px; overflow-y: auto; }
.control-panel { width: 190px; min-width: 190px; background: #fff; display: flex; flex-direction: column; align-items: center; padding: 14px 10px; gap: 10px; border-left: 1px solid #ddd; overflow-y: auto; }
.control-panel .ctrl-label { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
.ctrl-btn { width: 100%; padding: 9px 6px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 12px; text-align: center; transition: all 0.12s; }
.ctrl-btn:hover { background: #f5f5f5; }
.ctrl-btn.accent { background: #07c160; color: #fff; border-color: #07c160; }
.ctrl-btn.accent:hover { background: #06ad56; }
.ctrl-btn.danger:hover { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }
.mode-switch { display: flex; gap: 0; width: 100%; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
.mode-switch .mode-btn { flex: 1; padding: 7px 4px; border: none; background: #fff; cursor: pointer; font-size: 11px; transition: all 0.15s; }
.mode-switch .mode-btn.active { background: #07c160; color: #fff; }
.phone-frame { width: 375px; min-height: 600px; background: #ededed; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.18), 0 4px 20px rgba(0,0,0,0.12); overflow: hidden; display: flex; flex-direction: column; }
.status-bar { height: 36px; background: #ededed; display: flex; align-items: center; justify-content: center; position: relative; font-size: 13px; font-weight: 600; color: #000; padding: 0 10px; }
.status-bar .carrier { position: absolute; left: 16px; font-size: 12px; }
.status-bar .battery { position: absolute; right: 16px; font-size: 12px; }
.nav-bar { height: 44px; background: #ededed; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 0.5px solid #d9d9d9; }
.nav-bar .back { position: absolute; left: 8px; font-size: 22px; color: #000; display: flex; align-items: center; gap: 2px; cursor: default; }
.nav-bar .back::after { content: "\5fae\4fe1"; font-size: 14px; }
.nav-bar .title { font-size: 17px; font-weight: 600; color: #000; }
.nav-bar .more { position: absolute; right: 16px; font-size: 20px; color: #000; }
.chat-area { flex: 1; padding: 10px 10px 20px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.chat-area.shot-active { padding: 0; gap: 0; overflow: hidden; display: block; }
.empty-hint { text-align: center; color: #ccc; font-size: 14px; padding: 80px 20px; }
.time-divider { text-align: center; color: #b2b2b2; font-size: 12px; margin: 8px 0; user-select: none; }
.msg-row { display: flex; align-items: flex-start; gap: 8px; max-width: 100%; }
.msg-row.left { justify-content: flex-start; }
.msg-row.right { flex-direction: row-reverse; }
.avatar { width: 36px; height: 36px; border-radius: 4px; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; user-select: none; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.bubble { max-width: 240px; padding: 8px 12px; border-radius: 4px; font-size: 16px; line-height: 1.45; word-break: break-word; position: relative; }
.msg-row.left .bubble { background: #fff; color: #000; border: 0.5px solid #e5e5e5; }
.msg-row.right .bubble { background: #95ec69; color: #000; }
.transfer-bubble { max-width: 240px; min-width: 160px; border-radius: 4px; overflow: hidden; }
.msg-row.right .transfer-bubble { background: #95ec69; }
.msg-row.left .transfer-bubble { background: #fff; border: 0.5px solid #e5e5e5; }
.transfer-content { display: flex; align-items: center; padding: 10px 12px; gap: 8px; }
.transfer-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; font-weight: bold; }
.msg-row.right .transfer-icon { background: rgba(255,255,255,0.85); color: #333; }
.msg-row.left .transfer-icon { background: #fa9d3b; color: #fff; }
.transfer-amount { font-size: 16px; font-weight: 500; }
.msg-row.right .transfer-amount { color: #fff; text-shadow: 0 0 2px rgba(0,0,0,0.08); }
.msg-row.left .transfer-amount { color: #000; }
.transfer-unit { font-size: 11px; opacity: 0.8; }
.msg-row.right .transfer-unit { color: rgba(255,255,255,0.8); }
.msg-row.left .transfer-unit { color: #888; }
.transfer-footer { padding: 4px 12px; font-size: 10px; display: flex; align-items: center; gap: 4px; }
.msg-row.right .transfer-footer { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.45); }
.msg-row.left .transfer-footer { background: #f7f7f7; color: #999; }
.redpacket-bubble { max-width: 240px; min-width: 160px; border-radius: 4px; overflow: hidden; background: #fa9d3b !important; }
.redpacket-top { padding: 12px 14px 8px; color: #fff; display: flex; align-items: center; gap: 8px; }
.redpacket-icon { width: 36px; height: 36px; background: #e88b2a; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.redpacket-greet { font-size: 14px; }
.redpacket-bot { padding: 6px 14px 8px; font-size: 10px; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 4px; }
.system-msg { text-align: center; color: #b2b2b2; font-size: 12px; padding: 6px 16px; background: rgba(0,0,0,0.04); border-radius: 4px; margin: 4px auto; max-width: 280px; line-height: 1.5; user-select: none; }
.location-bubble { max-width: 220px; border-radius: 4px; overflow: hidden; }
.msg-row.right .location-bubble { background: #95ec69; }
.msg-row.left .location-bubble { background: #fff; border: 0.5px solid #e5e5e5; }
.location-map { height: 80px; background: linear-gradient(135deg, #7cb342 0%, #558b2f 50%, #33691e 100%); display: flex; align-items: center; justify-content: center; }
.location-pin { font-size: 28px; }
.location-addr { padding: 8px 12px; font-size: 14px; color: #000; }
.msg-row.right .location-addr { border-top: 0.5px solid rgba(0,0,0,0.08); }
.msg-row.left .location-addr { border-top: 0.5px solid #e5e5e5; }
.voice-bubble { display: flex; align-items: center; gap: 6px; min-width: 56px; cursor: default; }
.voice-icon { font-size: 20px; }
.voice-dur { font-size: 14px; }
.msg-row.right .voice-bubble { flex-direction: row-reverse; }
.image-bubble { max-width: 220px; padding: 3px !important; border-radius: 4px; overflow: hidden; background: transparent !important; border: none !important; }
.image-bubble img { width: 100%; display: block; border-radius: 3px; }
.input-bar { height: 48px; background: #f7f7f7; display: flex; align-items: center; padding: 0 12px; gap: 10px; border-top: 0.5px solid #ddd; }
.input-bar .circle-icon { font-size: 22px; color: #666; user-select: none; }
.input-bar .fake-input { flex: 1; height: 32px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 4px; }
.chat-area::-webkit-scrollbar { width: 0; }

/* Role buttons */
.role-buttons { display: flex; gap: 12px; justify-content: center; }
.role-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 14px 24px; border: 2px solid #e0e0e0; border-radius: 12px; background: #fff; cursor: pointer; transition: all 0.12s; min-width: 120px; user-select: none; -webkit-user-select: none; }
.role-btn:active { transform: scale(0.96); }
.role-btn.pressed { transform: scale(0.94); border-color: #07c160; background: #f0fff4; }
.role-btn .role-avatar { font-size: 28px; }
.role-btn .role-name { font-size: 13px; color: #333; font-weight: 500; }
.role-btn .role-hint { font-size: 11px; color: #999; }
.role-btn .role-count { font-size: 11px; color: #07c160; font-weight: 600; }
.role-btn.done { opacity: 0.5; border-color: #e0e0e0; cursor: default; }

/* Action buttons */
.action-buttons { display: flex; gap: 10px; justify-content: center; }
.action-btn { height: 34px; padding: 0 18px; border: 1px solid #ddd; border-radius: 17px; font-size: 13px; cursor: pointer; background: #fff; color: #555; transition: all 0.15s; white-space: nowrap; }
.action-btn:hover { background: #f5f5f5; }
.action-btn.active { background: #07c160; color: #fff; border-color: #07c160; }
#undoBtn:hover { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }

/* Screenshot mode */
.shot-group-list { margin-top: 8px; }
.shot-group { margin-bottom: 12px; }
.shot-group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.shot-group-name { font-size: 12px; color: #07c160; font-weight: 500; cursor: pointer; padding: 3px 6px; border-radius: 4px; transition: background 0.15s; }
.shot-group-name:hover { background: #e8f8ef; }
.shot-group-name.group-active { background: #07c160; color: #fff; }
.shot-group-del { width: 20px; height: 20px; border: none; background: none; color: #ccc; font-size: 16px; cursor: pointer; line-height: 20px; text-align: center; border-radius: 50%; }
.shot-group-del:hover { color: #e74c3c; background: #fff5f5; }
.shot-empty { font-size: 11px; color: #ccc; font-style: italic; }
.shot-thumbs { display: flex; gap: 6px; flex-wrap: wrap; }
.shot-thumb-wrap { position: relative; display: inline-block; }
.shot-thumb { width: 48px; height: 72px; object-fit: cover; border-radius: 4px; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s; display: block; }
.shot-thumb:hover { border-color: #07c160; }
.shot-thumb.thumb-sel { border-color: #07c160; box-shadow: 0 0 0 2px rgba(7,193,96,0.3); }
.shot-thumb.dragging { opacity: 0.4; border-color: #ff9800; }
.shot-thumb.drag-over { border-color: #ff9800; border-style: dashed; transform: scale(1.1); }
.shot-thumb-delete { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; background: #e74c3c; color: #fff; border: none; border-radius: 50%; font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; display: none; z-index: 2; }
.shot-thumb-wrap:hover .shot-thumb-delete { display: block; }
.shot-thumb-delete:hover { background: #c0392b; transform: scale(1.2); }
.html-thumb { width: 48px; height: 72px; background: #fff9c4; border-radius: 4px; border: 2px solid #ffc107; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
.html-thumb.thumb-sel { border-color: #07c160; box-shadow: 0 0 0 2px rgba(7,193,96,0.3); }
.html-chat-content { font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; font-size: 14px; line-height: 1.6; }
.html-chat-content .msg { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; max-width: 100%; }
.html-chat-content .msg.left { justify-content: flex-start; }
.html-chat-content .msg.right { flex-direction: row-reverse; }
.html-chat-content .msg .avatar { width: 30px; height: 30px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; }
.html-chat-content .msg .avatar.av-left { background: #ff7675; }
.html-chat-content .msg .avatar.av-right { background: #4a90d9; }
.html-chat-content .msg .bubble { max-width: 200px; padding: 6px 10px; border-radius: 4px; font-size: 14px; word-break: break-word; }
.html-chat-content .msg.left .bubble { background: #fff; color: #000; border: 0.5px solid #e5e5e5; }
.html-chat-content .msg.right .bubble { background: #95ec69; color: #000; }
.html-chat-content .time { text-align: center; color: #b2b2b2; font-size: 11px; margin: 6px 0; }
.html-chat-content .system { text-align: center; color: #b2b2b2; font-size: 11px; padding: 4px 10px; background: rgba(0,0,0,0.04); border-radius: 3px; margin: 4px auto; max-width: 200px; }
.shot-viewport { width: 100%; flex: 1; overflow: hidden; position: relative; }
.shot-img-scroll { width: 100%; display: block; position: relative; }
.shot-marker { position: absolute; left: 0; right: 0; height: 2px; z-index: 5; pointer-events: none; }
.left-panel:not(.shot-mode) #shotUploadSection { display: none; }
.left-panel.shot-mode .panel-section:not(#shotUploadSection) { display: none; }
.msg-height-adj { display: flex; align-items: center; gap: 6px; width: 100%; font-size: 11px; color: #888; }
.msg-height-adj input { flex: 1; }

/* Progress */
.progress-wrap { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 340px; }
.progress-bar { flex: 1; height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #07c160; border-radius: 3px; transition: width 0.2s; width: 0%; }
.progress-text { font-size: 12px; color: #888; white-space: nowrap; min-width: 50px; text-align: center; }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 6px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Session modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: #fff; border-radius: 12px; padding: 20px; width: 360px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.modal-box h2 { font-size: 17px; margin-bottom: 14px; }
.modal-box .form-row { margin-bottom: 10px; }
.modal-box .form-row input { flex: 1; height: 32px; padding: 0 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none; }
.modal-box .btn-row { margin-top: 14px; }

.mobile-toggle { display: none; }
@media (max-width: 1024px) {
  .control-panel { width: 160px; min-width: 160px; padding: 10px 6px; gap: 8px; }
  .ctrl-btn { font-size: 11px; padding: 8px 4px; }
  .left-panel { width: 300px; min-width: 300px; }
}
@media (max-width: 820px) {
  .app { flex-direction: column; }
  .left-panel { width: 100%; min-width: 100%; max-height: 45vh; overflow-y: auto; transition: max-height 0.3s; }
  .left-panel.collapsed { max-height: 0; overflow: hidden; }
  .phone-wrapper { padding: 6px; flex: 1; min-height: 50vh; }
  .phone-frame { width: 100%; max-width: 400px; min-height: 420px; flex: 1; }
  .control-panel { width: 100%; min-width: 100%; max-height: none; flex-direction: row; flex-wrap: wrap; justify-content: center; padding: 8px 6px; gap: 6px; border-left: none; border-top: 1px solid #ddd; overflow-y: visible; }
  .control-panel .ctrl-label { display: none; }
  .ctrl-btn { width: auto; padding: 8px 12px; font-size: 12px; }
  .mode-switch { width: auto; }
  .role-btn { min-width: 90px; padding: 12px 14px; }
  .role-btn .role-name { font-size: 12px; }
  .role-btn .role-avatar { font-size: 24px; }
  .mobile-toggle { display: inline-block; }
  .topbar .desktop-only { display: none; }
  .action-btn { height: 30px; padding: 0 14px; font-size: 12px; }
}
@media (max-width: 480px) {
  .left-panel { max-height: 40vh; }
  .phone-frame { border-radius: 0; width: 100%; max-width: 100%; }
  .control-panel { padding: 6px 4px; gap: 4px; }
  .ctrl-btn { padding: 7px 10px; font-size: 11px; }
}
</style>
</head>

<body>

<!-- Top Bar -->
<div class="topbar">
  <select id="sessionSelect" onchange="loadSession(this.value)">
    <option value="">-- 当前会话 --</option>
  </select>
  <button class="tb-btn mobile-toggle" onclick="toggleEditor()" title="显示/隐藏编辑器">编辑</button>
  <button class="tb-btn desktop-only" onclick="saveCurrentSession()" title="保存当前会话">保存</button>
  <button class="tb-btn" onclick="showNewSessionModal()">+ 新建</button>
  <button class="tb-btn danger" onclick="deleteCurrentSession()" title="删除当前会话">删除</button>
  <span class="spacer"></span>
  <input id="backendUrl" type="text" placeholder="后端地址(可选)" style="height:28px;width:180px;padding:0 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;outline:none;" onchange="onBackendUrlChange()">
  <button class="tb-btn" onclick="syncToBackend()" title="同步到后端服务器">同步</button>
  <span class="spacer"></span>
  <button class="tb-btn primary" onclick="exportPNG()">导出 PNG</button>
  <button class="tb-btn" onclick="exportSession()" title="导出会话">导出</button>
  <button class="tb-btn" onclick="importSession()" title="导入会话">导入</button>
</div>

<div class="app">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="panel-section">
      <h3>聊天设置</h3>
      <div class="form-row"><label>标题</label><input id="cfgTitle" type="text" value="微信聊天" oninput="onConfigChange()"></div>
      <div class="form-row"><label>时间</label><input id="cfgTime" type="text" value="14:30" oninput="onConfigChange()"></div>
      <div class="avatar-row">
        <div class="avatar-item">
          <label>角色2（对方）</label>
          <div class="avatar-preview avatar-left" id="previewLeft">&#x1f481;</div>
          <input id="cfgLeftAvatar" value="&#x1f481;" oninput="onConfigChange()" placeholder="emoji">
        </div>
        <div class="avatar-item">
          <label>角色1（我）</label>
          <div class="avatar-preview avatar-right" id="previewRight">&#x1f468;</div>
          <input id="cfgRightAvatar" value="&#x1f468;" oninput="onConfigChange()" placeholder="emoji">
        </div>
      </div>
    </div>
    <div class="panel-section">
      <h3>对话内容</h3>
      <textarea id="chatInput" oninput="onConfigChange()">角色1：😌
角色2：😄
角色1：在干嘛呢
角色2：刚起来
角色2：不对，刚醒
角色1：我也是刚醒😌
（角色1 发送了一张酒店房间的图片）
角色2：旅游啦
角色2：看你住酒店
角色1：来这边工作😌
角色2：挺好的呀，深圳下雨
角色1：自己待着房间有点无聊
角色2：这话说的，难道你还要服务员跟你呆一起啊，哈哈
角色2：那就起来出去

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>

// ========== State ==========
var currentSessionId = null;
var messages = [];           // parsed messages array
var revealOrder = [];        // per-message: 0=hidden, >0=reveal sequence (click order)
var revealCounter = 0;       // increments each time a message is revealed
var isPlaying = false;       // playback mode active
var _refreshTimer = null;
var currentMode = "text";      // "text" or "screenshot"
var shotGroups = [];           // screenshot groups: [{name, images:[{id,data,name}], annotations:{}}]
var shotCurrent = null;        // currently displayed image id
var shotRevealIdx = 0;         // scroll offset in message-heights
var SHOT_MSG_HEIGHT = 50;      // pixels per WeChat message row
var activeShotGroup = null;    // name of group currently uploading to

// ========== Mode Switching ==========
function switchMode(mode) {
  currentMode = mode;
  // Persist mode so refresh stays on current page
  try { localStorage.setItem('wxchat_mode', mode); } catch(e) {}
  document.getElementById("modeTextBtn").classList.toggle("active", mode === "text");
  document.getElementById("modeShotBtn").classList.toggle("active", mode === "screenshot");
  var lp = document.querySelector(".left-panel");
  var annBtn = document.getElementById("ctrlAnnotate");
  var r2 = document.getElementById("btnRole2");
  var r1 = document.getElementById("btnRole1");
  var undo = document.getElementById("ctrlUndo");
  var hAdj = document.getElementById("msgHeightAdj");
  if (mode === "text") {
    lp.classList.remove("shot-mode");
    document.getElementById("chatArea").classList.remove("shot-active");
    document.getElementById("ctrlReplay").textContent = "逐条还原";
    annBtn.style.display = "none";
    hAdj.style.display = "none";
    r2.style.display = "";
    r1.style.display = "";
    undo.textContent = "清除上一条";
  } else {
    lp.classList.add("shot-mode");
    document.getElementById("ctrlReplay").textContent = "回放";
    annBtn.style.display = "";
    hAdj.style.display = "";
    r2.style.display = "none";
    r1.style.display = "none";
    undo.textContent = "消息回退";
    if (!document.getElementById("shotUploadSection")) initShotMode();
  }
  fullRefresh();
}

function getSessions() {
  try { return JSON.parse(localStorage.getItem("wxchat_sessions") || "[]"); } catch(e) { return []; }
}
function saveSessions(list) {
  localStorage.setItem("wxchat_sessions", JSON.stringify(list));
}
function getSession(id) {
  var list = getSessions();
  for (var i = 0; i < list.length; i++) { if (list[i].id === id) return list[i]; }
  return null;
}
function saveSessionData(s) {
  var list = getSessions();
  for (var i = 0; i < list.length; i++) {
    if (list[i].id === s.id) { list[i] = s; saveSessions(list); return; }
  }
  list.push(s);
  saveSessions(list);
}
function deleteSessionData(id) {
  saveSessions(getSessions().filter(function(s) { return s.id !== id; }));
}

function buildSessionData() {
  return {
    id: currentSessionId || generateId(),
    name: document.getElementById("cfgTitle").value || "微信聊天",
    createdAt: Date.now(),
    config: {
      title: document.getElementById("cfgTitle").value,
      time: document.getElementById("cfgTime").value,
      leftAvatar: document.getElementById("cfgLeftAvatar").value,
      rightAvatar: document.getElementById("cfgRightAvatar").value
    },
    content: document.getElementById("chatInput").value,
    revealOrder: revealOrder,
    revealCounter: revealCounter
  };
}

function autoSave() {
  if (!currentSessionId) return;
  var s = buildSessionData();
  saveSessionData(s);
  // Also persist screenshot scroll state
  if (currentMode === "screenshot") saveShotData();
}

function saveCurrentSession() {
  if (!currentSessionId) { showNewSessionModal(); return; }
  var s = buildSessionData();
  saveSessionData(s);
  updateSessionSelect();
  toast("已保存");
}

function loadSession(id) {
  if (!id) return;
  var s = getSession(id);
  if (!s) return;
  currentSessionId = s.id;
  document.getElementById("cfgTitle").value = s.config.title || "";
  document.getElementById("cfgTime").value = s.config.time || "14:30";
  document.getElementById("cfgLeftAvatar").value = s.config.leftAvatar || "";
  document.getElementById("cfgRightAvatar").value = s.config.rightAvatar || "";
  document.getElementById("chatInput").value = s.content || "";
  // Parse messages and restore reveal state
  messages = parseChat(s.content || "");
  if (s.revealOrder && s.revealOrder.length === messages.length) {
    revealOrder = s.revealOrder.slice();
    revealCounter = s.revealCounter || 0;
  } else {
    revealOrder = new Array(messages.length);
    for (var i = 0; i < revealOrder.length; i++) revealOrder[i] = 0;
    revealCounter = 0;
  }
  isPlaying = true;
  updateSessionSelect();
  fullRefresh();
}

function deleteCurrentSession() {
  if (!currentSessionId) { toast("没有可删除的会话"); return; }
  if (!confirm("确定删除当前会话？")) return;
  deleteSessionData(currentSessionId);
  currentSessionId = null;
  document.getElementById("chatInput").value = "";
  document.getElementById("cfgTitle").value = "微信聊天";
  resetPlayback();
  fullRefresh();
  updateSessionSelect();
  toast("已删除");
}

function showNewSessionModal() {
  document.getElementById("newSessionName").value = "";
  document.getElementById("newSessionModal").classList.add("show");
}
function toggleEditor() {
  var panel = document.querySelector(".left-panel");
  panel.classList.toggle("collapsed");
}

function closeNewSessionModal() {
  document.getElementById("newSessionModal").classList.remove("show");
}
function createNewSession() {
  var name = document.getElementById("newSessionName").value.trim() || "新对话";
  currentSessionId = generateId();
  document.getElementById("cfgTitle").value = name;
  document.getElementById("chatInput").value = "";
  document.getElementById("cfgTime").value = "14:30";
  document.getElementById("cfgLeftAvatar").value = "&#x1f481;";
  document.getElementById("cfgRightAvatar").value = "&#x1f468;";
  var s = buildSessionData();
  saveSessionData(s);
  resetPlayback();
  fullRefresh();
  updateSessionSelect();
  closeNewSessionModal();
  toast("已创建: " + name);
}

function updateSessionSelect() {
  var sel = document.getElementById("sessionSelect");
  var list = getSessions();
  var html = "<option value=\"\">-- 选择会话 --</option>";
  for (var i = 0; i < list.length; i++) {
    var selAttr = list[i].id === currentSessionId ? " selected" : "";
    html += "<option value=\"" + list[i].id + "\"" + selAttr + ">" + escHtml(list[i].name) + "</option>";
  }
  sel.innerHTML = html;
}

function generateId() { return "s" + Date.now() + "_" + Math.random().toString(36).slice(2,8); }

// ========== Parsing ==========
function parseChat(text) {
  var lines = text.split(/\n/);
  var msgs = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (!line.trim()) continue;
    var match;
    match = line.match(/^(我|对方):\s*(.*)/);
    if (match) { msgs.push({ type: "text", side: match[1] === "我" ? "right" : "left", text: match[2] }); continue; }
    match = line.match(/^角色\s*1\s*[：:]\s*(.*)/);
    if (match) { msgs.push({ type: "text", side: "right", text: match[1] }); continue; }
    match = line.match(/^角色\s*2\s*[：:]\s*(.*)/);
    if (match) { msgs.push({ type: "text", side: "left", text: match[1] }); continue; }
    match = line.match(/^（角色\s*1\s*发送定位[：:]\s*(.*)）$/);
    if (match) { msgs.push({ type: "location", side: "right", text: match[1] }); continue; }
    match = line.match(/^（角色\s*2\s*发送定位[：:]\s*(.*)）$/);
    if (match) { msgs.push({ type: "location", side: "left", text: match[1] }); continue; }
    match = line.match(/^（角色\s*1[^）]*发送[^）]*图片[^）]*）$/);
    if (match) { msgs.push({ type: "image", side: "right", src: "", text: "[图片]" }); continue; }
    match = line.match(/^（角色\s*2[^）]*发送[^）]*图片[^）]*）$/);
    if (match) { msgs.push({ type: "image", side: "left", src: "", text: "[图片]" }); continue; }
    match = line.match(/^time:\s*(.*)/);
    if (match) { msgs.push({ type: "time", text: match[1] }); continue; }
    match = line.match(/^system:\s*(.*)/);
    if (match) { msgs.push({ type: "system", text: match[1] }); continue; }
    match = line.match(/^transfer:\s*(我|对方|角色\s*1|角色\s*2)\s+(.*)/);
    if (match) { msgs.push({ type: "transfer", side: (match[1]==="我"||/1/.test(match[1])) ? "right" : "left", amount: match[2] }); continue; }
    match = line.match(/^redpacket:\s*(我|对方|角色\s*1|角色\s*2)\s+(.*)/);
    if (match) { msgs.push({ type: "redpacket", side: (match[1]==="我"||/1/.test(match[1])) ? "right" : "left", text: match[2] }); continue; }
    match = line.match(/^location:\s*(我|对方|角色\s*1|角色\s*2)\s+(.*)/);
    if (match) { msgs.push({ type: "location", side: (match[1]==="我"||/1/.test(match[1])) ? "right" : "left", text: match[2] }); continue; }
    match = line.match(/^image:\s*(我|对方|角色\s*1|角色\s*2)\s+(.*)/);
    if (match) { msgs.push({ type: "image", side: (match[1]==="我"||/1/.test(match[1])) ? "right" : "left", src: match[2] }); continue; }
    match = line.match(/^voice:\s*(我|对方|角色\s*1|角色\s*2)\s+(.*)/);
    if (match) { msgs.push({ type: "voice", side: (match[1]==="我"||/1/.test(match[1])) ? "right" : "left", dur: match[2] }); continue; }
    msgs.push({ type: "text", side: "left", text: line });
  }
  return msgs;
}

// ========== Playback ==========
function resetPlayback() {
  isPlaying = true;
  messages = parseChat(document.getElementById("chatInput").value);
  revealOrder = new Array(messages.length);
  for (var i = 0; i < revealOrder.length; i++) revealOrder[i] = 0;
  revealCounter = 0;
  updateRoleButtons();
  updateProgress();
  renderPlayback();
}

function revealNext(side) {
  if (!isPlaying) return false;
  for (var i = 0; i < messages.length; i++) {
    if (messages[i].side === side && revealOrder[i] === 0) {
      revealOrder[i] = ++revealCounter;
      renderPlayback();
      updateRoleButtons();
      updateProgress();
      autoSave();
      return true;
    }
  }
  return false;
}

function getRoleStats() {
  var leftTotal = 0, rightTotal = 0, leftSent = 0, rightSent = 0;
  for (var i = 0; i < messages.length; i++) {
    var m = messages[i];
    if (m.side === "left") { leftTotal++; if (revealOrder[i] > 0) leftSent++; }
    else if (m.side === "right") { rightTotal++; if (revealOrder[i] > 0) rightSent++; }
  }
  return { leftTotal: leftTotal, rightTotal: rightTotal, leftSent: leftSent, rightSent: rightSent };
}

function updateRoleButtons() {
  var stats = getRoleStats();
  var btn2 = document.getElementById("btnRole2");
  var btn1 = document.getElementById("btnRole1");

  document.getElementById("role2Count").textContent = stats.leftSent + "/" + stats.leftTotal;
  document.getElementById("role1Count").textContent = stats.rightSent + "/" + stats.rightTotal;
  document.getElementById("role2Avatar").innerHTML = document.getElementById("cfgLeftAvatar").value || "&#x1f481;";
  document.getElementById("role1Avatar").innerHTML = document.getElementById("cfgRightAvatar").value || "&#x1f468;";

  if (stats.leftSent >= stats.leftTotal) { btn2.classList.add("done"); }
  else { btn2.classList.remove("done"); }
  if (stats.rightSent >= stats.rightTotal) { btn1.classList.add("done"); }
  else { btn1.classList.remove("done"); }
}

function updateProgress() {
  var total = messages.length;
  var shown = revealOrder.filter(function(v) { return v > 0; }).length;
  document.getElementById("progressFill").style.width = total ? (shown / total * 100) + "%" : "0%";
  document.getElementById("progressText").textContent = shown + " / " + total;
}

// ========== Rendering ==========
function renderPlayback() {
  var area = document.getElementById("chatArea");
  // Screenshot mode: show the selected image
  if (currentMode === "screenshot" && shotCurrent) {
    showShotInPhone(shotCurrent);
    area.scrollTop = 0;
    return;
  }
  var leftAv = document.getElementById("cfgLeftAvatar").value || "💁";
  var rightAv = document.getElementById("cfgRightAvatar").value || "👨";
  var html = "";
  var anyVisible = false;
  for (var i = 0; i < messages.length; i++) {
    if (revealOrder[i] > 0) {
      html += renderMessage(messages[i], leftAv, rightAv);
      anyVisible = true;
    }
  }
  if (!anyVisible) {
    html = "<div class=\"empty-hint\">点击右侧角色按钮开始回放</div>";
  }
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

function renderFullPreview() {
  var area = document.getElementById("chatArea");
  var leftAv = document.getElementById("cfgLeftAvatar").value || "💁";
  var rightAv = document.getElementById("cfgRightAvatar").value || "👨";
  var msgs = parseChat(document.getElementById("chatInput").value);
  if (!msgs.length) {
    area.innerHTML = "<div class=\"empty-hint\">在左侧输入对话内容，然后点击下方按钮回放</div>";
    return;
  }
  var html = "";
  for (var i = 0; i < msgs.length; i++) {
    html += renderMessage(msgs[i], leftAv, rightAv);
  }
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

function renderMessage(m, al, ar) {
  if (m.type === "time") return "<div class=\"time-divider\">" + escHtml(m.text) + "</div>";
  if (m.type === "system") return "<div class=\"system-msg\">" + escHtml(m.text) + "</div>";
  if (m.type === "transfer") return buildTransfer(m, al, ar);
  if (m.type === "redpacket") return buildRedpacket(m, al, ar);
  if (m.type === "location") return buildLocation(m, al, ar);
  if (m.type === "image") return buildImage(m, al, ar);
  if (m.type === "voice") return buildVoice(m, al, ar);
  return buildText(m, al, ar);
}

function buildText(m, al, ar) {
  var av = m.side === "left" ? al : ar;
  return "<div class=\"msg-row " + m.side + "\"><div class=\"avatar\">" + av + "</div><div class=\"bubble\">" + escHtml(m.text) + "</div></div>";
}
function buildTransfer(m, al, ar) {
  var av = m.side === "left" ? al : ar;
  return "<div class=\"msg-row " + m.side + "\"><div class=\"avatar\">" + av + "</div><div class=\"transfer-bubble\"><div class=\"transfer-content\"><div class=\"transfer-icon\">&yen;</div><div class=\"transfer-info\"><div class=\"transfer-amount\">" + escHtml(m.amount||"0.00") + "</div><div class=\"transfer-unit\">微信转账</div></div></div><div class=\"transfer-footer\">微信转账</div></div></div>";
}
function buildRedpacket(m, al, ar) {
  var av = m.side === "left" ? al : ar;
  return "<div class=\"msg-row " + m.side + "\"><div class=\"avatar\">" + av + "</div><div class=\"redpacket-bubble\"><div class=\"redpacket-top\"><div class=\"redpacket-icon\">&#x1f4e6;</div><div class=\"redpacket-greet\">" + escHtml(m.text) + "</div></div><div class=\"redpacket-bot\">微信红包</div></div></div>";
}
function buildLocation(m, al, ar) {
  var av = m.side === "left" ? al : ar;
  return "<div class=\"msg-row " + m.side + "\"><div class=\"avatar\">" + av + "</div><div class=\"location-bubble\"><div class=\"location-map\"><div class=\"location-pin\">&#x1f4cd;</div></div><div class=\"location-addr\">" + escHtml(m.text) + "</div></div></div>";
}

// ========== Auto Play ==========
function autoPlay() {
  // Find the first unrevealed message in original conversation order
  var idx = -1;
  for (var i = 0; i < messages.length; i++) {
    if (revealOrder[i] === 0 && messages[i].side) {
      idx = i;
      break;
    }
  }
  if (idx < 0) {
    toast("对话已全部还原");
    return;
  }
  revealOrder[idx] = ++revealCounter;
  renderPlayback();
  updateRoleButtons();
  updateProgress();
  autoSave();
}

// ========== Undo Last ==========
function undoLast() {
  if (currentMode === "screenshot") {
    if (shotRevealIdx <= 0) { toast("没有可回退的"); return; }
    shotRevealIdx--;
    updateShotScroll();
    autoSave();
    return;
  }
  if (revealCounter <= 0) {
    toast("没有可清除的消息");
    return;
  }
  // Find the message with the highest revealOrder value
  var maxIdx = -1;
  var maxVal = 0;
  for (var i = 0; i < messages.length; i++) {
    if (revealOrder[i] > maxVal) {
      maxVal = revealOrder[i];
      maxIdx = i;
    }
  }
  if (maxIdx >= 0) {
    revealOrder[maxIdx] = 0;
    revealCounter--;
    // Re-number remaining to keep order contiguous
    if (revealCounter > 0) {
      var remaining = [];
      for (var j = 0; j < messages.length; j++) {
        if (revealOrder[j] > 0) remaining.push(j);
      }
      remaining.sort(function(a, b) { return revealOrder[a] - revealOrder[b]; });
      for (var k = 0; k < remaining.length; k++) {
        revealOrder[remaining[k]] = k + 1;
      }
      revealCounter = remaining.length;
    }
    renderPlayback();
    updateRoleButtons();
    updateProgress();
    autoSave();
  }
}

// ========== Utilities ==========
function escHtml(s) {
  if (!s) return "";
  s = String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  s = s.replace(/\n/g, "<br>");
  s = s.replace(/:\)/g, "\u{1f60a}").replace(/:D/g, "\u{1f601}").replace(/:P/g, "\u{1f61b}");
  s = s.replace(/:\(/g, "\u{1f61f}").replace(/;\)/g, "\u{1f609}");
  return s;
}
function escAttr(s) { return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

// ========== Export / Import ==========
function exportSession() {
  if (!currentSessionId) { toast("请先新建或保存会话"); return; }
  var s = buildSessionData();
  var blob = new Blob([JSON.stringify(s, null, 2)], {type: "application/json"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (s.name || "wechat") + ".wxchat.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  toast("已导出");
}

function importSession() {
  var input = document.createElement("input");
  input.type = "file"; input.accept = ".json,.wxchat";
  input.onchange = function() {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var s = JSON.parse(e.target.result);
        if (!s.id || !s.content === undefined) { toast("无效的会话文件"); return; }
        s.createdAt = Date.now();
        saveSessionData(s);
        currentSessionId = s.id;
        document.getElementById("cfgTitle").value = s.config.title || "";
        document.getElementById("cfgTime").value = s.config.time || "14:30";
        document.getElementById("cfgLeftAvatar").value = s.config.leftAvatar || "";
        document.getElementById("cfgRightAvatar").value = s.config.rightAvatar || "";
        document.getElementById("chatInput").value = s.content || "";
        messages = parseChat(s.content || "");
        if (s.revealOrder && s.revealOrder.length === messages.length) {
          revealOrder = s.revealOrder.slice();
          revealCounter = s.revealCounter || 0;
        } else {
          revealOrder = new Array(messages.length);
          for (var i = 0; i < revealOrder.length; i++) revealOrder[i] = 0;
          revealCounter = 0;
        }
        isPlaying = true;
        updateSessionSelect();
        fullRefresh();
        toast("已导入: " + s.name);
      } catch(err) { toast("导入失败: " + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Upload image file to backend server, returns (err, url) via callback
function uploadFileToBackend(file, callback) {
  var formData = new FormData();
  formData.append('file', file);
  fetch(BACKEND_URL.replace(/\/$/, '') + '/api/upload/image', {
    method: 'POST',
    body: formData
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok && data.url) {
      callback(null, data.url);
    } else {
      callback(data.error || 'Upload failed');
    }
  })
  .catch(function(err) {
    callback(err.message || 'Network error');
  });
}

// Upload HTML content to backend server
function uploadHtmlToBackend(htmlContent, name, callback) {
  fetch(BACKEND_URL.replace(/\/$/, '') + '/api/upload/html', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: htmlContent, name: name || 'chat' })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok && data.url) {
      callback(null, data.url);
    } else {
      callback(data.error || 'Upload failed');
    }
  })
  .catch(function(err) {
    callback(err.message || 'Network error');
  });
}

function getGroupByName(name) {
  for (var i = 0; i < shotGroups.length; i++) {
    if (shotGroups[i].name === name) return shotGroups[i];

function uploadToActiveGroup() {
  if (!activeShotGroup) { toast("请先选择一个分组"); return; }
  uploadScreenshots(activeShotGroup);

function uploadScreenshots(groupName) {
  var group = getGroupByName(groupName);
  if (!group) { toast("分组不存在"); return; }
  var input = document.createElement("input");
  input.type = "file"; input.accept = "image/*,.html,.htm"; input.multiple = true;
  input.onchange = function() {
    var files = input.files;
    if (!files.length) return;
    var loaded = 0;
    for (var i = 0; i < files.length; i++) {
      (function(file) {
        var isHtml = /\.html?$/i.test(file.name);
        if (isHtml) {
          // Read HTML file as text
          var htmlReader = new FileReader();
          htmlReader.onload = function(e) {
            group.images.push({
              id: "html_" + Date.now() + "_" + Math.random().toString(36).slice(2,6),
              name: file.name,
              type: "html",
              data: e.target.result
            });
            loaded++;
            if (loaded === files.length) { saveShotData(); renderShotGroups(); toast("已添加 " + files.length + " 个到 " + groupName); }
          };
          htmlReader.readAsText(file);
        } else if (BACKEND_URL) {
          // Upload image to backend server (permanent image hosting)
          uploadFileToBackend(file, function(err, url) {
            if (err) {
              // Fallback: store as base64 locally
              var fallbackReader = new FileReader();
              fallbackReader.onload = function(ev) {
                group.images.push({ id: "img_" + Date.now() + "_" + Math.random().toString(36).slice(2,6), name: file.name, type: "image", data: ev.target.result });
                loaded++;
                if (loaded === files.length) { saveShotData(); renderShotGroups(); toast("已添加 " + files.length + " 个到 " + groupName + " (本地存储)"); }
              };
              fallbackReader.readAsDataURL(file);
            } else {
              group.images.push({ id: "img_" + Date.now() + "_" + Math.random().toString(36).slice(2,6), name: file.name, type: "image", data: url, isUrl: true });
              loaded++;
              if (loaded === files.length) { saveShotData(); renderShotGroups(); toast("已添加 " + files.length + " 个到 " + groupName + " (已上传服务器)"); }
            }
          });
        } else {
          // No backend: store as base64
          var reader = new FileReader();
          reader.onload = function(e) {
            group.images.push({ id: "img_" + Date.now() + "_" + Math.random().toString(36).slice(2,6), name: file.name, type: "image", data: e.target.result });
            loaded++;
            if (loaded === files.length) { saveShotData(); renderShotGroups(); toast("已添加 " + files.length + " 张到 " + groupName); }
          };
          reader.readAsDataURL(file);
        }
      })(files[i]);
    }
  };
  input.click();
}

// ========== Drag-to-Reorder ==========
var _dragGroup = null;
var _dragFromIdx = -1;

function onShotDragStart(e) {
  _dragGroup = e.target.closest('.shot-thumb-wrap').getAttribute('data-group');
  _dragFromIdx = parseInt(e.target.closest('.shot-thumb-wrap').getAttribute('data-index'));
  e.target.closest('.shot-thumb-wrap').querySelector('.shot-thumb').classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _dragGroup + '|' + _dragFromIdx);
}

function onShotDragEnd(e) {
  var thumb = e.target.closest('.shot-thumb-wrap');
  if (thumb) thumb.querySelector('.shot-thumb').classList.remove('dragging');
  // Remove all drag-over highlights
  document.querySelectorAll('.shot-thumb.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
  _dragGroup = null;
  _dragFromIdx = -1;
}

function onShotDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var wrap = e.target.closest('.shot-thumb-wrap');
  if (wrap) {
    wrap.querySelector('.shot-thumb').classList.add('drag-over');
  }
}

function onShotDragLeave(e) {
  var wrap = e.target.closest('.shot-thumb-wrap');
  if (wrap) {
    wrap.querySelector('.shot-thumb').classList.remove('drag-over');
  }
}

function onShotDrop(e) {
  e.preventDefault();
  var wrap = e.target.closest('.shot-thumb-wrap');
  if (wrap) wrap.querySelector('.shot-thumb').classList.remove('drag-over');
  if (!_dragGroup) return;
  var toGroup = wrap ? wrap.getAttribute('data-group') : null;
  var toIdx = wrap ? parseInt(wrap.getAttribute('data-index')) : -1;
  if (toIdx < 0 || _dragGroup !== toGroup || _dragFromIdx === toIdx) return;

  var group = getGroupByName(_dragGroup);
  if (!group) return;
  // Move image from _dragFromIdx to toIdx
  var moved = group.images.splice(_dragFromIdx, 1)[0];
  group.images.splice(toIdx, 0, moved);
  saveShotData();
  renderShotGroups();
  toast("已调整顺序");
}

// ========== Backend Sync ==========
var BACKEND_URL = localStorage.getItem("wxchat_backend_url") || "";

function onBackendUrlChange() {
  BACKEND_URL = document.getElementById("backendUrl").value.trim();
  if (BACKEND_URL) {
    localStorage.setItem("wxchat_backend_url", BACKEND_URL);
  } else {
    localStorage.removeItem("wxchat_backend_url");
  }
}

function syncToBackend() {
  if (!BACKEND_URL) { toast("请先设置后端地址"); return; }
  var btn = document.querySelector(".topbar .tb-btn:last-child");
  var origText = btn.textContent;
  btn.textContent = "同步中...";
  btn.disabled = true;

  // Upload all shot groups as base64 images
  var payload = { groups: shotGroups };
  fetch(BACKEND_URL.replace(/\/$/, '') + '/api/sync', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    toast("同步成功！其他设备可查看");
    btn.textContent = origText;
    btn.disabled = false;
  })
  .catch(function(err) {
    toast("同步失败: " + err.message);
    btn.textContent = origText;
    btn.disabled = false;
  });
}

function pullFromBackend() {
  if (!BACKEND_URL) return Promise.resolve();
  return fetch(BACKEND_URL.replace(/\/$/, '') + '/api/sync', {
    method: 'GET'
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.groups && data.groups.length) {
      shotGroups = data.groups;
      saveShotData();
      renderShotGroups();
      fullRefresh();
    }
  })
  .catch(function(err) {
    console.log("Backend pull skipped:", err.message);
  });
}

function renderShotGroups() {
  var el = document.getElementById("shotGroupList");
  if (!el) return;
  var html = "";
  for (var g = 0; g < shotGroups.length; g++) {
    var group = shotGroups[g];
    var isActive = activeShotGroup === group.name;
    html += '<div class="shot-group" data-group="' + escAttr(group.name) + '">';
    html += '<div class="shot-group-header">';
    html += '<span class="shot-group-name' + (isActive ? ' group-active' : '') + '" onclick="setActiveGroup(\'' + escAttr(group.name) + '\');uploadScreenshots(\'' + escAttr(group.name) + '\')" title="点击上传到该分组">' + escHtml(group.name) + ' (' + group.images.length + '个)</span>';
    html += '<button class="shot-group-del" onclick="event.stopPropagation();deleteShotGroup(\'' + escAttr(group.name) + '\')" title="删除分组">&times;</button>';
    html += '</div><div class="shot-thumbs" data-group="' + escAttr(group.name) + '">';
    for (var k = 0; k < group.images.length; k++) {
      var img = group.images[k];
      var sel = shotCurrent === img.id ? ' thumb-sel' : '';
      var isHtmlType = img.type === 'html';
      html += '<div class="shot-thumb-wrap" draggable="true" data-img-id="' + img.id + '" data-group="' + escAttr(group.name) + '" data-index="' + k + '" ondragstart="onShotDragStart(event)" ondragend="onShotDragEnd(event)" ondragover="onShotDragOver(event)" ondragleave="onShotDragLeave(event)" ondrop="onShotDrop(event)">';
      if (isHtmlType) {
        html += '<div class="shot-thumb html-thumb' + sel + '" onclick="event.stopPropagation();selectShotImage(\'' + img.id + '\')" title="' + escHtml(img.name) + ' (HTML)">&#x1f4c4;</div>';
      } else {
        html += '<img src="' + img.data + '" class="shot-thumb' + sel + '" onclick="event.stopPropagation();selectShotImage(\'' + img.id + '\')" title="' + escHtml(img.name) + '">';
      }
      html += '<button class="shot-thumb-delete" onclick="event.stopPropagation();event.preventDefault();deleteShotImage(\'' + img.id + '\')" title="删除">&times;</button>';
      html += '</div>';
    }
    if (!group.images.length) html += '<span class="shot-empty">暂无，点击分组名上传图片或HTML</span>';
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function selectShotImage(id) {
  shotCurrent = id;
  // Restore saved scroll position for this image, or 0 if never scrolled
  var img = findShotById(id);
  shotRevealIdx = (img && img.revealIdx) ? img.revealIdx : 0;
  renderShotGroups();
  showShotInPhone(id);
  // Persist selection for page refresh restoration
  saveShotData();
  // Update progress bar to match restored position
  setTimeout(function() { updateShotScroll(); }, 400);
}

function showShotInPhone(id) {
  var img = findShotById(id);
  if (!img) return;
  var area = document.getElementById("chatArea");
  area.classList.add("shot-active");
  if (img.type === 'html') {
    // Render HTML chat content directly
    var htmlContent = img.data || '';
    // Extract body content if it's a full HTML document
    var bodyMatch = htmlContent.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    if (bodyMatch) {
      htmlContent = bodyMatch[1];
    }
    area.innerHTML = '<div class="shot-viewport" id="shotViewport"><div class="html-chat-content" id="shotHtmlContent" style="padding:10px;background:#ededed;min-height:100%;">' + htmlContent + '</div></div>';
    setTimeout(function() { updateShotScroll(); }, 400);
  } else {
    // Image mode
    var src = img.data || '';
    area.innerHTML = '<div class="shot-viewport" id="shotViewport"><img src="' + src + '" class="shot-img-scroll" id="shotImg" style="transform:translateY(0);"></div>';
    var simg = document.getElementById("shotImg");
    if (simg) {
      simg.onload = function() {
        simg.style.display = 'block';
        updateShotScroll();
      };
      if (simg.complete && simg.naturalHeight > 0) {
        updateShotScroll();
      }
      setTimeout(function() { updateShotScroll(); }, 300);
    }
  }
}

function findShotById(id) {
  for (var g = 0; g < shotGroups.length; g++) {
    for (var k = 0; k < shotGroups[g].images.length; k++) {
      if (shotGroups[g].images[k].id === id) return shotGroups[g].images[k];
    }
  }
  return null;
}

function updateShotScroll() {
  var simg = document.getElementById("shotImg");
  var shtml = document.getElementById("shotHtmlContent");
  var offset = shotRevealIdx * SHOT_MSG_HEIGHT;
  var chatArea = document.getElementById("chatArea");
  var viewH = chatArea ? chatArea.clientHeight : 400;
  var contentH = 0;

  if (simg) {
    contentH = simg.clientHeight || simg.naturalHeight || 0;
    var maxOffset = Math.max(0, contentH - viewH + 10);
    if (offset > maxOffset) offset = maxOffset;
    simg.style.transform = "translateY(-" + offset + "px)";
    simg.style.transition = "transform 0.25s ease";
  } else if (shtml) {
    contentH = shtml.scrollHeight || shtml.clientHeight || 0;
    var maxOffset2 = Math.max(0, contentH - viewH + 10);
    if (offset > maxOffset2) offset = maxOffset2;
    shtml.style.transform = "translateY(-" + offset + "px)";
    shtml.style.transition = "transform 0.25s ease";
  } else {
    return;
  }
  var maxOff = Math.max(0, contentH - viewH + 10);
  updateShotProgress(offset, maxOff);
}

function updateShotProgress(offset, maxOffset) {
  var fill = document.getElementById("progressFill");
  var text = document.getElementById("progressText");
  if (!fill || !text) return;
  if (currentMode !== "screenshot") return;
  var pct = maxOffset > 0 ? Math.round(offset / maxOffset * 100) : 0;
  fill.style.width = pct + "%";
  text.textContent = pct + "%  (" + Math.round(offset) + "/" + Math.round(maxOffset) + "px)";
}

// Adjust message height from control panel
function setMsgHeight(h) {
  SHOT_MSG_HEIGHT = Math.max(20, Math.min(150, parseInt(h) || 50));
  document.getElementById("msgHeightVal").textContent = SHOT_MSG_HEIGHT + "px";
  updateShotScroll();
}

function findShotGroupByImageId(id) {
  for (var g = 0; g < shotGroups.length; g++) {
    for (var k = 0; k < shotGroups[g].images.length; k++) {
      if (shotGroups[g].images[k].id === id) return shotGroups[g];
    }
  }
  return null;
}

// Annotation: click on the screenshot image to add a marker line
function annotateShot(e) {
  if (currentMode !== "screenshot" || !shotCurrent) return;
  var simg = document.getElementById("shotImg");
  if (!simg) return;
  var rect = simg.getBoundingClientRect();
  var y = e.clientY - rect.top;
  var h = rect.height;
  var pctY = Math.round(y / h * 100);
  // Determine side based on horizontal position
  var x = e.clientX - rect.left;
  var side = x < rect.width * 0.55 ? "left" : "right";
  var group = findShotGroupByImageId(shotCurrent);
  if (!group) return;
  if (!group.annotations[shotCurrent]) group.annotations[shotCurrent] = [];
  group.annotations[shotCurrent].push({ y: y, pctY: pctY, side: side });
  group.annotations[shotCurrent].sort(function(a, b) { return a.y - b.y; });
  saveShotData();
  drawAnnotationMarkers();
}

function drawAnnotationMarkers() {
  // Remove existing markers
  document.querySelectorAll(".shot-marker").forEach(function(el) { el.remove(); });
  var group = findShotGroupByImageId(shotCurrent);
  if (!group || !group.annotations[shotCurrent]) return;
  var display = document.getElementById("shotDisplay");
  if (!display) return;
  var anns = group.annotations[shotCurrent];
  for (var i = 0; i < anns.length; i++) {
    var m = document.createElement("div");
    m.className = "shot-marker";
    m.style.cssText = "position:absolute;left:0;right:0;top:" + anns[i].pctY + "%;height:2px;background:" + (anns[i].side === "left" ? "#ff7675" : "#4a90d9") + ";z-index:5;pointer-events:none;";
    display.appendChild(m);
  }
}

// ========== IndexedDB Storage (replaces localStorage for images) ==========
var DB_NAME = 'wxchat_db';
var DB_VERSION = 1;
var _idb = null;

function idbOpen() {
  return new Promise(function(resolve, reject) {
    if (_idb) return resolve(_idb);
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('shots')) {
        db.createObjectStore('shots', {keyPath: 'key'});
      }
      if (!db.objectStoreNames.contains('config')) {
        db.createObjectStore('config', {keyPath: 'key'});
      }
    };
    req.onsuccess = function(e) { _idb = e.target.result; resolve(_idb); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}

function idbPut(storeName, key, value) {
  return idbOpen().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(storeName, 'readwrite');
      tx.objectStore(storeName).put({key: key, value: value});
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}

function idbGet(storeName, key) {
  return idbOpen().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(storeName, 'readonly');
      var req = tx.objectStore(storeName).get(key);
      req.onsuccess = function() { resolve(req.result ? req.result.value : null); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  });
}

function saveShotData() {
  // Persist current scroll position onto the image object before saving
  if (shotCurrent) {
    var img = findShotById(shotCurrent);
    if (img) img.revealIdx = shotRevealIdx;
  }
  // Save to IndexedDB (persistent, large capacity)
  idbPut('shots', 'shotGroups', JSON.parse(JSON.stringify(shotGroups))).catch(function(e) {
    console.error('IDB save failed:', e);
  });
  // Persist current selection for page refresh restoration
  if (shotCurrent) {
    idbPut('config', 'lastShotCurrent', shotCurrent).catch(function(){});
    idbPut('config', 'lastShotRevealIdx', shotRevealIdx).catch(function(){});
  }
  // Auto-sync to backend for cross-device sharing (silent, no toast)
  if (BACKEND_URL) {
    syncToBackendSilent();
  }
}

// Silent sync (no UI feedback) for auto-save
var _syncTimer = null;
function syncToBackendSilent() {
  if (!BACKEND_URL) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() {
    var payload = { groups: shotGroups };
    fetch(BACKEND_URL.replace(/\/$/, '') + '/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function(err) {
      console.log('Auto-sync failed:', err.message);
    });
  }, 500);
}

function loadShotData() {
  return idbGet('shots', 'shotGroups').then(function(d) {
    if (d && d.length) {
      shotGroups = d;
      // Restore active group if it existed
      if (activeShotGroup && !getGroupByName(activeShotGroup)) {
        activeShotGroup = shotGroups.length ? shotGroups[0].name : null;
      }
    }
  });
}

// Override autoPlay for screenshot mode
var _origAutoPlay = autoPlay;
autoPlay = function() {
  if (currentMode === "screenshot") {
    if (!shotCurrent) { toast("请先选择一张截图"); return; }
    var simg = document.getElementById("shotImg");
    var shtml = document.getElementById("shotHtmlContent");
    if (!simg && !shtml) return;
    // Use rendered height; for data URIs naturalHeight may be 0 until onload
    var imgH = shtml ? (shtml.scrollHeight || shtml.clientHeight || 0) : (simg.clientHeight || simg.naturalHeight || 0);
    // Viewport: use chat area height
    var chatArea = document.getElementById("chatArea");
    var viewH = chatArea ? chatArea.clientHeight : 400;
    // Ensure image has loaded and dimensions are known
    if (imgH <= 0) { toast("图片加载中，请稍后"); return; }
    // Calculate how far we can scroll: make sure last pixel of image can reach top of viewport
    var maxOffset = Math.max(0, imgH - viewH + 10);
    var currentOffset = shotRevealIdx * SHOT_MSG_HEIGHT;
    if (currentOffset > maxOffset) {
      toast("截图已全部回放");
      return;
    }
    shotRevealIdx++;
    updateShotScroll();
    autoSave();
    return;
  }
  _origAutoPlay();
};

// ========== Init ==========
(function init() {
  // Restore backend URL if saved
  var savedBackend = localStorage.getItem("wxchat_backend_url");
  if (savedBackend) {
    BACKEND_URL = savedBackend;
    document.getElementById("backendUrl").value = savedBackend;
  }
  // Load shot data from IndexedDB asynchronously
  loadShotData().then(function() {
    continueInit();
  }).catch(function(e) {
    console.error("IDB load failed, continuing without shot data:", e);
    continueInit();
  });
})();

function continueInit() {
  // Restore saved mode (stay on same page after refresh)
  var savedMode = null;
  try { savedMode = localStorage.getItem('wxchat_mode'); } catch(e) {}
  if (savedMode === 'screenshot' || savedMode === 'text') {
    currentMode = savedMode;
  }
  // Auto-create default group if none exist
  if (!shotGroups.length) {
    shotGroups.push({ name: "默认分组", images: [], annotations: {} });
    activeShotGroup = "默认分组";
  }
  // Restore active group from IndexedDB
  idbGet('config', 'activeShotGroup').then(function(name) {
    if (name && getGroupByName(name)) {
      activeShotGroup = name;
      if (currentMode === 'screenshot') renderShotGroups();
    }
  });
  // Restore last selected image in screenshot mode
  idbGet('config', 'lastShotCurrent').then(function(imgId) {
    if (imgId && currentMode === 'screenshot' && findShotById(imgId)) {
      shotCurrent = imgId;
      idbGet('config', 'lastShotRevealIdx').then(function(idx) {
        if (idx !== null && idx !== undefined) shotRevealIdx = parseInt(idx) || 0;
      });
    }
  });
  updateSessionSelect();
  updatePhoneHeader();
  // Pull from backend if configured (cross-device sync)
  pullFromBackend().then(function() {
    if (currentMode === 'screenshot') {
      renderShotGroups();
      fullRefresh();
    }
  });
  // Auto-restore the most recently saved session
  var sessions = getSessions();
  if (sessions.length > 0) {
    sessions.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    var last = sessions[0];
    currentSessionId = last.id;
    document.getElementById("cfgTitle").value = last.config.title || "微信聊天";
    document.getElementById("cfgTime").value = last.config.time || "14:30";
    document.getElementById("cfgLeftAvatar").value = last.config.leftAvatar || "";
    document.getElementById("cfgRightAvatar").value = last.config.rightAvatar || "";
    document.getElementById("chatInput").value = last.content || "";
    messages = parseChat(last.content || "");
    if (last.revealOrder && last.revealOrder.length === messages.length) {
      revealOrder = last.revealOrder.slice();
      revealCounter = last.revealCounter || 0;
    } else {
      revealOrder = new Array(messages.length);
      for (var i = 0; i < revealOrder.length; i++) revealOrder[i] = 0;
      revealCounter = 0;
    }
    isPlaying = true;
    updateSessionSelect();
    fullRefresh();
  } else {
    resetPlayback();
    fullRefresh();
  }
  // Start periodic sync from backend (every 8 seconds for cross-device sync)
  if (BACKEND_URL) {
    setInterval(function() {
      pullFromBackend().then(function() {
        if (currentMode === 'screenshot') {
          renderShotGroups();
          if (shotCurrent) showShotInPhone(shotCurrent);
        }
      });
    }, 8000);
  }
}
</script>
